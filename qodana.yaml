#-------------------------------------------------------------------------------#
#               Qodana analysis is configured by qodana.yaml file               #
#             https://www.jetbrains.com/help/qodana/qodana-yaml.html            #
#-------------------------------------------------------------------------------#

version: "1.0"

linter: jetbrains/qodana-python:2025.2

profile:
  name: qodana.starter

bootstrap: pip install -r requirements.txt -r requirements-dev.txt

inspections:
  # PyTypeHintsInspection fires false-positives on valid Python 3.12 syntax (str | None, list[X]).
  # Type correctness is already enforced by mypy (strict mode) and ruff (UP rules).
  - inspection: PyTypeHintsInspection
    enabled: false
