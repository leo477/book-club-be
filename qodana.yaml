version: "1.0"

linter: jetbrains/qodana-python:2025.3

# Вказуємо основну директорію. Це пришвидшує вихід з dumb-mode
sourceDirectory: app

profile:
  name: qodana.starter

include:
  - name: All
    paths:
      - app/
      - alembic/
      - migrations/
      - scripts/
      - tests/

exclude:
  - name: All
    paths:
      - .venv
      - venv
      - .pytest_cache
      - __pycache__
      - .git
      - .github
      - "**/*.pyc"
      # Якщо у вас є папка з даними або логами всередині app, додайте її сюди:
      # - app/data

bootstrap: python3 -m venv .venv && .venv/bin/pip install --upgrade pip && .venv/bin/pip install -r requirements.txt -r requirements-dev.txt