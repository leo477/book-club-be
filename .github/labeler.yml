api:
  - changed-files:
      - any-glob-to-any-file:
          - app/routers/**

service:
  - changed-files:
      - any-glob-to-any-file: app/services/**

config:
  - changed-files:
      - any-glob-to-any-file:
          - app/config.py
          - app/database.py

docker:
  - changed-files:
      - any-glob-to-any-file:
          - Dockerfile
          - .dockerignore
          - docker-compose*.yml

tests:
  - changed-files:
      - any-glob-to-any-file: tests/**

ci:
  - changed-files:
      - any-glob-to-any-file: .github/**

docs:
  - changed-files:
      - any-glob-to-any-file:
          - "*.md"
          - docs/**

build:
  - changed-files:
      - any-glob-to-any-file:
          - pyproject.toml
          - requirements*.txt
          - alembic.ini
          - alembic/**
