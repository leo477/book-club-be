name: CI

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

permissions:
  contents: read
  security-events: write

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Ruff check
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      - name: Mypy strict
        run: uv run mypy app/
      - name: Bandit security lint
        run: uv run bandit -r app/ -ll -x app/routers/health.py

  test:
    needs: lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: bookclub_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U test -d bookclub_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync
      - name: Run pytest with coverage
        run: uv run pytest -v --tb=short --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=70
        env:
          DATABASE_URL: postgresql+asyncpg://test:test@localhost:5432/bookclub_test
          SECRET_KEY: test-secret-key-for-ci-pipeline-32chars
      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage.xml
      - name: Upload pytest results
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pytest-results-${{ github.sha }}
          path: .pytest_cache/
  sonarcloud:
    name: SonarCloud
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
        with:
          fetch-depth: 0 # full history for blame/annotations
      - name: Download coverage report
        continue-on-error: true
        uses: actions/download-artifact@v4
        with:
          name: coverage-${{ github.sha }}
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@299e4b793aaa83bf2aba7c9c14bedbb485688ec4 # v7.1.0
        continue-on-error: true
        with:
          args: >
            -Dsonar.qualitygate.wait=true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      - name: Wait for SonarCloud analysis to complete
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          TASK_ID=$(grep ceTaskId .scannerwork/report-task.txt | cut -d= -f2)
          echo "Waiting for SonarCloud task: $TASK_ID"
          for i in $(seq 1 60); do
            STATUS=$(curl -s -H "Authorization: Bearer $SONAR_TOKEN" \
              "https://sonarcloud.io/api/ce/task?id=$TASK_ID" \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['task']['status'])")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "SUCCESS" ]; then exit 0; fi
            if [ "$STATUS" = "FAILED" ] || [ "$STATUS" = "CANCELLED" ]; then
              echo "SonarCloud task failed: $STATUS"; exit 1
            fi
            sleep 5
          done
          echo "Timed out waiting for SonarCloud analysis"; exit 1
      - name: Export SonarCloud issues as SARIF
        if: github.event_name == 'push'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: |
          curl -s -u "${SONAR_TOKEN}:" \
            "https://sonarcloud.io/api/issues/search?projectKeys=leo477_book-club-be&resolved=false&ps=500" \
            -o sonar-issues.json
          python3 - <<'EOF'
          import json
          with open('sonar-issues.json') as f:
              data = json.load(f)
          def to_level(sev):
              return 'error' if sev in ('BLOCKER','CRITICAL') else 'warning' if sev == 'MAJOR' else 'note'
          results = []
          for issue in data.get('issues', []):
              tr = issue.get('textRange', {})
              results.append({
                  'ruleId': issue['rule'],
                  'message': {'text': issue['message']},
                  'level': to_level(issue.get('severity', 'INFO')),
                  'locations': [{'physicalLocation': {
                      'artifactLocation': {'uri': issue['component'].split(':')[-1]},
                      'region': {'startLine': tr.get('startLine', 1), 'endLine': tr.get('endLine', 1)}
                  }}]
              })
          sarif = {
              'version': '2.1.0',
              '$schema': 'https://raw.githubusercontent.com/oasis-tcs/sarif-spec/master/Schemata/sarif-schema-2.1.0.json',
              'runs': [{'tool': {'driver': {'name': 'SonarCloud', 'informationUri': 'https://sonarcloud.io', 'rules': []}}, 'results': results}]
          }
          with open('sonar.sarif', 'w') as f:
              json.dump(sarif, f, indent=2)
          print(f"SARIF generated with {len(results)} issues")
          EOF
      - name: Upload SonarCloud SARIF to Security tab
        if: github.event_name == 'push'
        uses: github/codeql-action/upload-sarif@45775bd8235c68ba998cffa5171334d58593da47 # v3
        with:
          sarif_file: sonar.sarif
          category: sonarcloud

  security-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      - name: Install pip-audit
        run: uv tool install pip-audit
      - name: Run pip-audit
        run: pip-audit --project . --format=json -o pip-audit-report.json || true
      - name: Upload security reports
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: security-reports-${{ github.sha }}
          path: pip-audit-report.json
