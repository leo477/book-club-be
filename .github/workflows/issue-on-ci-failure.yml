name: Auto-manage CI Failure Issues

on:
  workflow_run:
    workflows: ["CI/CD Pipeline"]
    types: [completed]

permissions:
  issues: write
  contents: read

jobs:
  handle-failure:
    if: github.event.workflow_run.conclusion == 'failure'
    runs-on: ubuntu-latest
    steps:
      - name: Create or update CI failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;
            const title = `[CI Failure] ${run.name} on ${run.head_branch}`;
            const body = [
              `## CI/CD Pipeline failed on \`${run.head_branch}\``,
              '',
              `| Field | Value |`,
              `|---|---|`,
              `| **Branch** | \`${run.head_branch}\` |`,
              `| **Commit** | [\`${run.head_sha.slice(0,7)}\`](${run.repository.html_url}/commit/${run.head_sha}) |`,
              `| **Run** | [#${run.run_number} — View logs](${run.html_url}) |`,
              `| **Triggered by** | ${run.triggering_actor?.login ?? 'unknown'} |`,
              '',
              'Please investigate and fix the failing job(s).',
            ].join('\n');

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-failure',
              state: 'open',
              per_page: 1,
            });

            if (existing.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing[0].number,
                body: [
                  `### New failure on run [#${run.run_number}](${run.html_url})`,
                  `Commit: [\`${run.head_sha.slice(0,7)}\`](${run.repository.html_url}/commit/${run.head_sha})`,
                ].join('\n'),
              });
              core.info(`Updated existing issue #${existing[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title,
                body,
                labels: ['ci-failure', 'automated'],
              });
              core.info(`Created issue #${issue.number}: ${issue.html_url}`);
            }

  handle-success:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Close open CI failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const run = context.payload.workflow_run;

            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'ci-failure',
              state: 'open',
              per_page: 10,
            });

            for (const issue of existing) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  `CI/CD Pipeline **passed** — closing this issue.`,
                  `Fixed by commit [\`${run.head_sha.slice(0,7)}\`](${run.repository.html_url}/commit/${run.head_sha}) on run [#${run.run_number}](${run.html_url}).`,
                ].join('\n'),
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
                state_reason: 'completed',
              });
              core.info(`Closed issue #${issue.number}`);
            }
