sonar.projectKey=leo477_book-club-be
sonar.organization=leo477

sonar.sources=app
sonar.tests=tests
sonar.python.version=3.12

# Coverage report from pytest-cov --cov-report=xml
sonar.python.coverage.reportPaths=coverage.xml

# Exclude infrastructure files from analysis
sonar.exclusions=alembic/**
sonar.coverage.exclusions=app/main.py,app/routers/health.py,app/routers/chat.py

# Source encoding
sonar.sourceEncoding=UTF-8
